<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI学習アシスタント</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.8rem;
      color: #2d3748;
    }
    .top-card, .main-card {
      max-width: 860px;
      margin: 0 auto;
    }
    .top-card { margin-bottom: 20px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #4a5568; }
    .field-label {
      display: block;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .text-input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .helper-text {
      margin-top: 8px;
      color: #718096;
      font-size: 0.85rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      margin: 4px;
    }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-blue { background: #3182ce; color: white; }
    .upload-dropzone {
      border: 2px dashed #90cdf4;
      border-radius: 12px;
      background: #f7fafc;
      padding: 24px 16px;
      text-align: center;
      color: #4a5568;
      transition: border-color 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }
    .upload-dropzone.dragover { border-color: #3182ce; background: #ebf8ff; }
    .upload-dropzone strong { display: block; margin-bottom: 6px; color: #2d3748; }
    .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .file-list-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 8px;
      background: #edf2f7; color: #2d3748; font-size: 0.9rem;
    }
    .file-list-item span { flex: 1; word-break: break-word; }
    .file-remove-btn {
      background: none; border: none; color: #fc8181;
      cursor: pointer; font-size: 1rem; padding: 0 4px; line-height: 1; flex-shrink: 0;
    }
    .file-remove-btn:hover { color: #e53e3e; }
    .file-list-empty {
      padding: 10px 12px; border-radius: 8px;
      background: #edf2f7; color: #a0aec0; font-size: 0.9rem;
    }
    .status-box, .result-box {
      margin-top: 16px; padding: 14px; border-radius: 10px;
      font-size: 0.92rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
    }
    .status-box { display: none; background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .result-box { display: none; background: #f7fafc; color: #2d3748; border: 1px solid #e2e8f0; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.45); border-top-color: white;
      border-radius: 50%; display: none; animation: spin 0.8s linear infinite;
    }
    .btn.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) { .btn { width: 100%; margin: 4px 0; } }
  </style>
</head>
<body>

<h1>🤖 AI学習アシスタント</h1>

<div class="top-card card">
  <h2>🔐 OpenAI APIキー</h2>
  <label class="field-label" for="api-key-input">APIキーを入力</label>
  <input type="password" id="api-key-input" class="text-input" placeholder="sk-..." autocomplete="off" />
  <p class="helper-text">APIキーはこのブラウザの localStorage にのみ保存され、外部には送信されません。</p>
</div>

<div class="main-card card">
  <h2>🤖 AI要約＆記述問題生成</h2>
  <input type="file" id="file-input" accept=".pdf,.txt" hidden multiple />
  <div id="upload-dropzone" class="upload-dropzone" tabindex="0" role="button" aria-label="ファイルをアップロード">
    <strong>PDF / TXT ファイルをアップロード</strong>
    <span>ドラッグ＆ドロップ、またはクリックして複数ファイルを選択</span>
  </div>
  <div id="file-list" class="file-list"><p class="file-list-empty">未選択</p></div>
  <button id="generate-btn" class="btn btn-blue" style="margin-top:16px;">
    <span class="spinner" aria-hidden="true"></span>
    <span>要約＆問題生成</span>
  </button>
  <div id="error-message" class="status-box" role="alert"></div>
  <div id="result-box" class="result-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  const MODEL = 'gpt-4o-mini';
  const PDF_FALLBACK = 'PDFをテキストとして読み込めませんでした。TXTファイルをお試しください。';
  const PROMPT_SINGLE = '以下の内容を読んで、\n1. 200字程度で要約してください\n2. この内容に基づいた記述問題を3問作成してください（各問に模範解答も付けてください）\n\n';
  const PROMPT_MULTI  = '以下の複数のファイルの内容を読んで、\n1. 全体を通じて200〜300字程度で総合的に要約してください\n2. これらの内容に基づいた記述問題を3問作成してください（各問に模範解答も付けてください）\n\n';

  if (window.pdfjsLib) {
    try { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
    catch (e) { console.error('pdf.js worker error', e); }
  }

  const API_KEY_STORAGE = 'openai-api-key';
  const apiKeyInput   = document.getElementById('api-key-input');
  const fileInput     = document.getElementById('file-input');
  const dropzone      = document.getElementById('upload-dropzone');
  const fileListEl    = document.getElementById('file-list');
  const generateBtn   = document.getElementById('generate-btn');
  const errorBox      = document.getElementById('error-message');
  const resultBox     = document.getElementById('result-box');
  let selectedFiles   = [];

  const showError  = m  => { errorBox.style.display = 'block'; errorBox.textContent = m; };
  const hideError  = () => { errorBox.style.display = 'none'; errorBox.textContent = ''; };
  const showResult = c  => { resultBox.style.display = 'block'; resultBox.textContent = c; };
  const setLoading = v  => { generateBtn.disabled = v; generateBtn.classList.toggle('loading', v); };
  const saveApiKey = () => {
    const v = apiKeyInput.value.trim();
    v ? localStorage.setItem(API_KEY_STORAGE, v) : localStorage.removeItem(API_KEY_STORAGE);
  };

  function isSupportedFile(f) {
    const n = f.name.toLowerCase();
    return n.endsWith('.pdf') || n.endsWith('.txt');
  }

  function renderFileList() {
    fileListEl.innerHTML = '';
    if (!selectedFiles.length) {
      const p = document.createElement('p');
      p.className = 'file-list-empty'; p.textContent = '未選択';
      fileListEl.appendChild(p); return;
    }
    selectedFiles.forEach((file, i) => {
      const item = document.createElement('div'); item.className = 'file-list-item';
      const span = document.createElement('span'); span.textContent = file.name;
      const btn  = document.createElement('button'); btn.className = 'file-remove-btn'; btn.textContent = '✕';
      btn.setAttribute('aria-label', `${file.name} を削除`);
      btn.addEventListener('click', () => { selectedFiles.splice(i, 1); renderFileList(); });
      item.appendChild(span); item.appendChild(btn); fileListEl.appendChild(item);
    });
  }

  function addFilesToSelection(files) {
    const arr = Array.from(files);
    const bad = arr.filter(f => !isSupportedFile(f));
    let added = 0;
    for (const f of arr) {
      if (!isSupportedFile(f)) continue;
      if (!selectedFiles.some(x => x.name === f.name && x.size === f.size)) { selectedFiles.push(f); added++; }
    }
    renderFileList();
    if (bad.length && !added) showError('対応しているのは PDF / TXT ファイルです。');
    else if (bad.length) showError(`${bad.length}件の非対応ファイルをスキップしました。`);
    else if (added) hideError();
  }

  function readFile(file, method) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error('ファイルの読み込みに失敗しました。'));
      r[method](file);
    });
  }

  async function extractPdfText(file) {
    if (!window.pdfjsLib?.getDocument) throw new Error(PDF_FALLBACK);
    try {
      const buf = await readFile(file, 'readAsArrayBuffer');
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const c = await page.getTextContent();
        pages.push(c.items.map(x => x.str).join(' '));
      }
      return pages.join('\n');
    } catch (e) { throw new Error(PDF_FALLBACK); }
  }

  async function getFileText(file) {
    const text = file.name.toLowerCase().endsWith('.pdf')
      ? await extractPdfText(file)
      : await readFile(file, 'readAsText');
    if (!String(text).trim()) throw new Error(`「${file.name}」から読み取れる内容が見つかりませんでした。`);
    return String(text).trim();
  }

  async function buildPayload(files) {
    const sections = [];
    for (let i = 0; i < files.length; i++) {
      const text = await getFileText(files[i]);
      sections.push(files.length > 1 ? `[ファイル${i+1}: ${files[i].name}]\n${text}` : text);
    }
    const prompt = (files.length > 1 ? PROMPT_MULTI : PROMPT_SINGLE) + sections.join('\n\n');
    return { model: MODEL, messages: [{ role: 'user', content: prompt }] };
  }

  async function callOpenAI(payload, apiKey) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify(payload)
    });
    let data = {};
    try { data = await res.json(); } catch { throw new Error('OpenAI APIの応答を読み取れませんでした。'); }
    if (!res.ok) throw new Error(data?.error?.message || `APIエラー (ステータス: ${res.status})`);
    const content = data?.choices?.[0]?.message?.content || '';
    if (!content) throw new Error('AIから有効な応答を取得できませんでした。');
    return content;
  }

  async function generate() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { alert('OpenAI APIキーを入力してください。'); apiKeyInput.focus(); return; }
    saveApiKey();
    if (!selectedFiles.length) { showError('ファイルを選択してから実行してください。'); return; }
    hideError(); resultBox.style.display = 'none'; setLoading(true);
    try {
      const result = await callOpenAI(await buildPayload(selectedFiles), apiKey);
      showResult(result);
    } catch (e) {
      showError(e.message || '処理中にエラーが発生しました。');
    } finally { setLoading(false); }
  }

  apiKeyInput.value = localStorage.getItem(API_KEY_STORAGE) || '';
  apiKeyInput.addEventListener('blur', saveApiKey);
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) addFilesToSelection(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length) { addFilesToSelection(e.target.files); fileInput.value = ''; }
  });
  generateBtn.addEventListener('click', generate);
</script>

</body>
</html>
